name: CI

# Runs on every PR and on pushes to the long-lived branches. The job
# is intentionally fast and dependency-light so it can be a required
# status check without slowing reviews down.
on:
  pull_request:
  push:
    branches: [master, dev]

# Cancel an in-progress run if the same ref gets a newer push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # CI=true makes react-scripts treat warnings as errors.
        # GENERATE_SOURCEMAP=false matches the production build script.
        run: CI=true npm run build
        env:
          # Build-time env. These are public (REACT_APP_* values ship in
          # the bundle anyway) and only need to be syntactically present
          # for the build to succeed — real values are injected at deploy
          # time, not here. Override via repository variables if a build
          # step ever needs project-specific config.
          REACT_APP_FIREBASE_API_KEY: ${{ vars.REACT_APP_FIREBASE_API_KEY || 'ci-placeholder' }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ vars.REACT_APP_FIREBASE_AUTH_DOMAIN || 'ci.firebaseapp.com' }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ vars.REACT_APP_FIREBASE_PROJECT_ID || 'ci-project' }}
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ vars.REACT_APP_STRIPE_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}

  functions:
    name: Cloud Functions (install + syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Syntax check
        # functions/ has no test suite yet (tracked as a launch-readiness
        # gap). Until one exists, a Node syntax check on the entry point
        # catches the most common breakage — a parse error that would
        # fail the whole deploy.
        working-directory: functions
        run: node --check index.js
